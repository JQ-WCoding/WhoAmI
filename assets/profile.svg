<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Lee Jun Kyu profile mark</title>
  <desc id="desc">A dark cosmic profile mark with JQ initials.</desc>
  <defs>
    <radialGradient id="bg" cx="45%" cy="30%" r="72%">
      <stop offset="0" stop-color="#33476c"/>
      <stop offset="0.46" stop-color="#111a2b"/>
      <stop offset="1" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="ring" x1="70" x2="250" y1="36" y2="284">
      <stop offset="0" stop-color="#f4f7fb"/>
      <stop offset="0.45" stop-color="#9bbcff"/>
      <stop offset="1" stop-color="#9ff0d0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="320" rx="160" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="132" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.6"/>
  <circle cx="160" cy="160" r="96" fill="none" stroke="#9bbcff" stroke-width="1" opacity="0.18"/>
  <g fill="#f4f7fb" opacity="0.9">
    <circle cx="73" cy="88" r="1.6"/>
    <circle cx="252" cy="98" r="1.4"/>
    <circle cx="226" cy="226" r="1.2"/>
    <circle cx="95" cy="238" r="1.3"/>
    <circle cx="171" cy="58" r="1.1"/>
    <circle cx="56" cy="171" r="1.1"/>
  </g>
  <path d="M78 205c36-58 73-86 118-86 28 0 50 9 70 27" fill="none" stroke="#9bbcff" stroke-width="1.6" opacity="0.38"/>
  <text x="160" y="174" text-anchor="middle" fill="#f4f7fb" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="0">JQ</text>
  <text x="160" y="214" text-anchor="middle" fill="#aab5c8" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600" letter-spacing="2">PORTFOLIO</text>
  <circle cx="160" cy="160" r="150" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08" filter="url(#glow)"/>
</svg>
